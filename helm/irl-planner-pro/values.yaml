# Default values for irl-planner-pro

# Name of an existing Secret (or SealedSecret) holding the application's
# sensitive values. When empty, the chart resolves the name to
# "<release>-<chart>-secret" (see irl.secretName in templates/_helpers.tpl).
# The chart does NOT create this Secret — supply one yourself (e.g. a
# SealedSecret in your environment overlay, or a plain Secret produced by
# `kubectl create secret generic ...`). Required keys:
#   - JWT_SECRET                 (>=32 chars; openssl rand -hex 32)
#   - POSTGRES_PASSWORD          (when postgres.enabled=true)
#   - DATABASE_URL               (when postgres.enabled=false)
# Optional keys:
#   - OIDC_CLIENT_SECRET         (when auth.mode=oidc)
#   - SMTP_PASSWORD              (when smtp.host is set and the relay needs auth)
#   - SLACK_BOT_TOKEN            (xoxb-… bot token to enable the Slack channel)
#   - METRICS_TOKEN              (when backend.metrics.exposeOnIngress=true)
#   - MCP_OAUTH_CLIENT_SECRET    (when mcp.enabled=true — the Phase 7 MCP surface)
existingSecret: ""

# Public URL (HTTPS in production — OIDC redirect + cookies assume it). Exposed
# to the backend as PUBLIC_BASE_URL and used to derive the OIDC redirect URL and
# the CORS allowlist when those are left empty.
publicBaseURL: "https://irl-planner.oglimmer.com"

# CORS allowlist for browser cross-origin requests (sets CORS_ALLOWED_ORIGINS).
# Leave empty and the backend locks CORS to publicBaseURL's own origin — correct
# for the same-origin SPA. Exact scheme+host[:port] match, no trailing slash.
corsAllowedOrigins: []
  # - http://localhost:5173

# IRL team. Receives "submission changed" notifications and the daily
# activity digest (IRL_TEAM_EMAIL). The FIRST user to sign in becomes admin
# automatically; admins then promote/demote others in-app.
irlTeamEmail: "irl@oglimmer.com"

# People team. Address shown to employees in the "can't attend" instructions on
# the form (PEOPLE_TEAM_EMAIL) — distinct from irlTeamEmail (the activity digest).
peopleTeamEmail: "people@oglimmer.com"

# Email domain shown in the sign-in UI copy ("Restricted to verified @<domain>
# accounts"), SIGN_IN_DOMAIN. Leave empty to default to the first
# auth.oidc.googleWorkspaceDomains entry; set explicitly when the IdP has no
# domain restriction (e.g. Keycloak) but you still want a domain in the copy.
# Empty with no workspace domain → generic copy with no domain.
signInDomain: ""

# IANA timezone pre-filled when an admin creates a new event
# (DEFAULT_EVENT_TIMEZONE).
defaultEventTimezone: "Europe/Paris"

# Authentication mode: "oidc" (OpenID Connect Authorization Code flow — the only
# mode for any shared deployment) or "password" (a local-dev stub with no real
# credential check — never enable on a shared deployment). When mode=oidc the
# sealed secret must additionally carry OIDC_CLIENT_SECRET.
auth:
  mode: oidc
  oidc:
    issuerURL: "https://id.oglimmer.de/realms/oglimmer"
    clientID: "irl-planner"
    # Defaults to "${publicBaseURL}/api/auth/oidc/callback" when empty.
    redirectURL: ""
    scopes: "openid email profile"
    # Google Workspace allowlist. Only enforced when the issuer is Google
    # (https://accounts.google.com); a no-op for any other IdP, so with this
    # Keycloak issuer it has no effect. Empty = no restriction (any realm user).
    googleWorkspaceDomains: []
      # - id5.io

# Reminder + digest scheduler. tz-aware; idempotent across restarts.
reminders:
  enabled: true
  tickInterval: 1h        # Go duration

# MCP server (Phase 7) — an additive, OAuth-gated, admin-scoped /mcp surface for
# MCP clients (e.g. Claude). Off by default and entirely inert unless enabled:
# the backend only wires up /mcp + /oauth + /.well-known when BOTH the client id
# (here) and client secret (in the sealed secret, key MCP_OAUTH_CLIENT_SECRET)
# are present. When enabled, the ingress also needs the /mcp, /oauth, and
# /.well-known paths added below (see ingress.hosts[].paths).
mcp:
  enabled: true
  oauth:
    # Public OAuth client id for the MCP connector.
    clientID: "irl-planner-mcp"
    # Allowlisted OAuth callback URIs (exact match). Defaults to Claude's
    # connector callback.
    redirectURIs:
      - https://claude.ai/api/mcp/auth_callback
      # Claude Code CLI loopback callback (claude mcp add --callback-port 8765)
      - http://localhost:8765/callback

# SMTP for outbound invitations, reminders + admin notifications. Leave host
# empty to disable email entirely — sends become best-effort no-ops.
# Currently a plain, unauthenticated relay on the LAN (port 25, no TLS), so no
# credentials are needed. For an authenticating relay (e.g. Fastmail on :465 with
# implicitTLS=true), put BOTH SMTP_USERNAME and SMTP_PASSWORD in the app Secret —
# without them the backend skips AUTH and Fastmail returns 530.
# implicitTLS and useTLS are mutually exclusive:
#   implicitTLS=true  → straight TLS / SMTPS (typically port 465)
#   useTLS=true       → STARTTLS upgrade   (typically port 587)
#   both false        → plain SMTP, no TLS (trusted relay only)
# from may be a bare address or a display-name form: '"Name" <addr@host>'.
#
# AWS SES (production): the backend speaks plain SMTP, so SES needs no code change.
# Point host at the regional SES SMTP endpoint, use STARTTLS on 587, verify `from`
# as a SES identity, and put the SES-generated SMTP credentials (NOT AWS access
# keys) into the app Secret as SMTP_USERNAME + SMTP_PASSWORD:
#   host: email-smtp.eu-central-1.amazonaws.com
#   port: 587
#   useTLS: true
#   implicitTLS: false
#   from: '"ID5 IRL" <noreply@oglimmer.com>'
smtp:
  host: "192.168.178.52"
  port: 25
  implicitTLS: false
  useTLS: false
  from: '"toldyouso robot" <robot@junta-online.net>'

# Backend (Go API) configuration. Stateless — no PVC; all state lives in
# Postgres, so it scales freely.
backend:
  name: api
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/irl-planner-pro-backend
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8080

  # Prometheus metrics on /metrics.
  #   enabled          = adds prometheus.io/scrape pod annotations (cluster scrape).
  #   exposeOnIngress  = adds /metrics to the public ingress. Only safe when a
  #                      METRICS_TOKEN is present in the sealed secret — the
  #                      backend then requires `Authorization: Bearer <token>`.
  metrics:
    enabled: true
    exposeOnIngress: false

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Extra environment variables injected verbatim into the backend container.
  extraEnv: []

# Frontend (nginx serving the SPA) configuration
frontend:
  name: web
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/irl-planner-pro-frontend
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Bundled Postgres (single-replica, PVC-backed). Set enabled=false to use an
# external database — then provide the full DSN via the sealed secret's
# DATABASE_URL key.
postgres:
  enabled: true
  image:
    repository: postgres
    # Pinned to major 16 — the PVC's data dir was initialized by PG 16 and a
    # major bump (e.g. 18) makes Postgres refuse to start ("data directory was
    # initialized by PostgreSQL version 16, not compatible"). Bumping the major
    # requires a deliberate pg_upgrade / dump+restore, never an image swap.
    # Renovate is configured to never offer a postgres major bump (renovate.json).
    tag: "16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb"
    pullPolicy: IfNotPresent
  user: irl
  database: irl
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress. cert-manager + ingress-nginx pattern. Path order matters — backend
# paths must come BEFORE the frontend catch-all.
ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
    # Cover-image uploads (POST /api/admin/events/:id/image) are capped at 4 MiB
    # by the backend, and both nginx configs allow 4m — but ingress-nginx defaults
    # to a 1m body limit and would 413 a >1 MiB image before it reaches the
    # backend. Keep this in step with eventImageCap in events_image.go.
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
  hosts:
    - host: irl-planner.oglimmer.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        - path: /healthz
          pathType: Exact
          backend: api
        - path: /readyz
          pathType: Exact
          backend: api
        - path: /
          pathType: Prefix
          backend: web
  tls:
    - secretName: tls-irl-planner-pro-ingress-dns
      hosts:
        - irl-planner.oglimmer.com

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod-level security context.
podSecurityContext:
  fsGroup: 65532

# Backend container security context. The distroless:nonroot image runs as
# uid 65532; the Go binary needs no write access to the root filesystem.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Frontend (nginx) container security context. Empty by default because the
# stock nginx:alpine entrypoint needs CHOWN/SETUID/SETGID/DAC_OVERRIDE to fix
# permissions on /var/cache/nginx and switch to the nginx user.
frontendSecurityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

deploymentAnnotations: {}

imagePullSecrets: []
