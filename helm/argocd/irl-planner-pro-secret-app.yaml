---
# Secrets-only Argo CD Application, separate from the chart's Application so:
#   - prune=false here protects the SealedSecret from accidental deletion if
#     it ever briefly disappears from source (rename, refactor, bad merge);
#   - the chart's Application can keep prune=true for its churn-y resources;
#   - argocd-image-updater keeps acting on the chart's single-source app
#     unchanged (multi-source apps require explicit write-back-target);
#   - chart health/rollback history isn't coupled to secret health.
#
# Bootstrap order on a fresh cluster: both Applications register concurrently
# (`kubectl apply -f helm/argocd/`), so the chart's pods may CrashLoopBackOff
# briefly until this Application creates the SealedSecret and the
# sealed-secrets controller materializes the underlying Secret. ArgoCD
# self-heals; it is not worth an app-of-apps wrapper.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: irl-planner-pro-secret
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/oglimmer/irl-planner-pro.git
    targetRevision: main
    path: helm/argocd
    directory:
      # Pick up only the SealedSecret manifest from this directory; the two
      # Application objects (this file and irl-planner-pro-app.yaml) belong in
      # the argocd namespace, not in the chart's target namespace, and are
      # applied with `kubectl apply -f helm/argocd/` directly.
      include: 'irl-planner-pro-sealed-secret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: irl-planner-pro
  syncPolicy:
    automated:
      # Never prune — the underlying Secret is load-bearing. The on-resource
      # `argocd.argoproj.io/sync-options: Prune=false` annotation in the
      # SealedSecret manifest is defence-in-depth on top of this.
      prune: false
      # Restore the SealedSecret if someone hand-edits it on the cluster.
      selfHeal: true
