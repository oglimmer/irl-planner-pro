# Front door for the Docker Compose deployment: serves the Vue SPA from disk
# and proxies backend paths to the backend service.
#
# In Helm the cluster Ingress does path → Service routing before traffic reaches
# this pod, so the proxy `location` blocks below are unreachable there and only
# the SPA blocks serve. Same image, same config in both deployments — when you
# add a new backend path, add it to BOTH this file AND the Helm values ingress
# paths so Compose and Helm stay in sync.

# Emit HSTS only for requests the edge served over HTTPS.
map $http_x_forwarded_proto $hsts_header {
    https   "max-age=31536000; includeSubDomains";
    default "";
}

server {
    listen 80;
    server_name _;

    client_max_body_size 4m;

    include /etc/nginx/snippets/security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               font/woff2 image/svg+xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://backend:8080;
    }

    # Phase 7 adds /mcp, /oauth/, and /.well-known/ proxy blocks here.

    # Hashed build artifacts — safe to cache forever.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # SPA entry — must always revalidate so deploys take effect.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SPA fallback.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
