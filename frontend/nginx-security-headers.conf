# Security response headers. Included at the server level (covering the SPA
# document) AND inside any static-file block that declares its own add_header —
# nginx replaces, rather than merges, inherited add_header directives.
#
# CSP: scripts locked to same-origin (Vite emits only external hashed module
# scripts) plus one allow-listed inline script — the pre-boot theme setter in
# index.html, pinned by its sha256 hash (keep in sync if that script changes:
# the browser console prints the new hash on violation). Inline styles are
# allowed (Vue scoped styles / SFC). frame-ancestors 'none' blocks clickjacking.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qhv+EGIe50b2e1nlOZ615bMENqkfIzU1mhS1je+6kok='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# HSTS only when the edge served the request over HTTPS (prod Ingress sets
# X-Forwarded-Proto: https). On plain-HTTP local dev the value is empty and
# nginx omits the header, so localhost is never pinned to HTTPS.
add_header Strict-Transport-Security $hsts_header always;
