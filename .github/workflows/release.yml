name: Release

# Fires when `./oglimmer.sh release` pushes a v* tag. Builds multi-arch
# (linux/amd64 + linux/arm64) images on the in-cluster ARC runner. No QEMU:
# both Dockerfiles cross-compile in a --platform=$BUILDPLATFORM build stage
# and the final stages have no RUN, so nothing executes under emulation
# (QEMU crashes the Go toolchain). Images are
# pushed to ghcr.io/oglimmer tagged as both :v<version> and :latest, and
# cuts a GitHub Release with auto-generated notes. The everyday :latest build
# happens in build.yml on every push to main (arm64-only, on the ARC runner);
# this workflow exists so tagged releases get reproducible, version-pinned,
# multi-arch images and a changelog.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create GitHub Release
  packages: write      # push to ghcr.io

jobs:
  release:
    name: Build & publish images
    runs-on: arc-irl-planner-pro

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oglimmer/irl-planner-pro-backend:${{ steps.version.outputs.version }}
            ghcr.io/oglimmer/irl-planner-pro-backend:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oglimmer/irl-planner-pro-frontend:${{ steps.version.outputs.version }}
            ghcr.io/oglimmer/irl-planner-pro-frontend:latest
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
            VITE_GIT_COMMIT=${{ github.sha }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
