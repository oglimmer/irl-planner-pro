name: Build & push images

# Builds the frontend and/or backend Docker images and pushes them to
# ghcr.io/oglimmer via the repo's oglimmer.sh script, on the in-cluster
# self-hosted ARC runner (arm64, Docker-in-Docker). Only the components whose
# files changed are built. The runner has no kubectl, so oglimmer.sh triggers
# the rollout via the restart hook (restart.oglimmer.com) using the
# RESTART_TOKEN secret passed in the environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One build per ref; cancel superseded pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Detect which parts of the repo changed so we only build the relevant images.
  changes:
    runs-on: arc-irl-planner-pro
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: arc-irl-planner-pro   # in-cluster ARC runner scale set
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Log in to ghcr.io
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --platform auto -> plain `docker build` + `docker push` via the dind
      # daemon (native arm64). Avoids the buildx docker-container driver, whose
      # push session times out against the registry's public ingress.
      # (oglimmer.sh defaults PLATFORM=arm64 which routes through buildx, so the
      # --platform auto flag here is required, not optional.)
      # No kubectl on the runner, so the rollout goes through the restart hook.
      - name: Build, push & restart backend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -b --platform auto --verbose

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: arc-irl-planner-pro
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Log in to ghcr.io
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No kubectl on the runner, so the rollout goes through the restart hook.
      - name: Build, push & restart frontend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -f --platform auto --verbose
